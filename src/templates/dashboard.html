<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gosling Discovery Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f111a;
            --accent-primary: #6366f1;
            --accent-secondary: #a855f7;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --surface: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(12px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #0f111a 100%);
        }

        header {
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: var(--glass-blur);
            background: rgba(15, 17, 26, 0.5);
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .search-container {
            flex: 1;
            max-width: 600px;
            margin: 0 4rem;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            padding: 1rem 1.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: var(--glass-blur);
        }

        input[type="text"]:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        main {
            flex: 1;
            display: flex;
            overflow: hidden;
            padding: 2rem 4rem;
            gap: 2rem;
        }

        #results-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding-right: 1rem;
        }

        .song-card {
            padding: 1.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .song-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(51, 65, 85, 0.7);
        }

        .song-card.active {
            border-color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .song-info h3 {
            font-size: 1.25rem;
            margin-bottom: 0.25rem;
            color: #fff;
        }

        .song-info p {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .song-year {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            color: var(--accent-primary);
            font-size: 0.85rem;
        }

        #detail-panel {
            width: 450px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            backdrop-filter: var(--glass-blur);
            overflow-y: auto;
            display: none;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(20px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .detail-header {
            margin-bottom: 2rem;
        }

        .detail-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .detail-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .meta-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
        }

        .section-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent-primary);
            text-transform: uppercase;
            margin-bottom: 1rem;
            display: block;
            letter-spacing: 0.1em;
        }

        .credit-list {
            margin-bottom: 2.5rem;
        }

        .credit-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }

        .credit-name {
            font-weight: 500;
        }

        .credit-role {
            color: var(--text-dim);
            font-size: 0.85rem;
            font-style: italic;
        }

        .tech-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .tech-box {
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
        }

        .tech-box label {
            font-size: 0.7rem;
            color: var(--text-dim);
            display: block;
            margin-bottom: 0.25rem;
        }

        .tech-box span {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">GOSLING V3CORE</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search by song title..." autocomplete="off">
        </div>
        <div class="status-dot" title="Engine Connected"></div>
    </header>

    <main>
        <section id="results-container">
            <div class="empty-state">
                <p>Type at least 2 characters to discover music</p>
            </div>
        </section>

        <section id="detail-panel">
            <!-- Populated by JS -->
        </section>
    </main>

    <script>
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('results-container');
        const detailPanel = document.getElementById('detail-panel');

        let debounceTimer;

        searchInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            const query = e.target.value.trim();

            if (query.length < 2) {
                resultsContainer.innerHTML = '<div class="empty-state"><p>Type at least 2 characters to discover music</p></div>';
                return;
            }

            debounceTimer = setTimeout(() => {
                searchSongs(query);
            }, 300);
        });

        async function searchSongs(query) {
            try {
                const response = await fetch(`/api/v1/songs/search?q=${encodeURIComponent(query)}`);
                if (!response.ok) throw new Error('Search failed');

                const songs = await response.json();
                renderResults(songs);
            } catch (error) {
                resultsContainer.innerHTML = `<div class="empty-state"><p style="color: #ef4444">Error: ${error.message}</p></div>`;
            }
        }

        function renderResults(songs) {
            if (songs.length === 0) {
                resultsContainer.innerHTML = '<div class="empty-state"><p>No results found matching your query</p></div>';
                return;
            }

            resultsContainer.innerHTML = songs.map(song => `
                <div class="song-card" onclick="showDetail(${JSON.stringify(song).replace(/"/g, '&quot;')}, this)">
                    <div class="song-info">
                        <h3>${song.title}</h3>
                        <p>${song.credits.length > 0 ? song.credits[0].display_name : 'Unknown Artist'}</p>
                    </div>
                    <div class="song-year">${song.year || 'N/A'}</div>
                </div>
            `).join('');
        }

        function showDetail(song, element) {
            // Highlight selected
            document.querySelectorAll('.song-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');

            detailPanel.style.display = 'block';

            const creditsHtml = song.credits.map(c => `
                <div class="credit-item">
                    <span class="credit-name">${c.display_name}</span>
                    <span class="credit-role">${c.role_id === 1 ? 'Performer' : 'Contributor'}</span>
                </div>
            `).join('');

            detailPanel.innerHTML = `
                <div class="detail-header">
                    <h2>${song.title}</h2>
                    <div class="detail-meta">
                        <span class="meta-tag">${song.year || 'No Date'}</span>
                        <span class="meta-tag">${song.isrc || 'No ISRC'}</span>
                    </div>
                </div>

                <span class="section-label">Personnel</span>
                <div class="credit-list">
                    ${creditsHtml || '<p style="color: var(--text-dim)">No contributor data found</p>'}
                </div>

                <span class="section-label">Technical Metadata</span>
                <div class="tech-grid">
                    <div class="tech-box">
                        <label>BPM</label>
                        <span>${song.bpm || 'N/A'}</span>
                    </div>
                    <div class="tech-box">
                        <label>Duration</label>
                        <span>${(song.duration_ms / 1000).toFixed(2)}s</span>
                    </div>
                    <div class="tech-box" style="grid-column: span 2">
                        <label>Hash</label>
                        <span style="font-size: 0.75rem">${song.audio_hash}</span>
                    </div>
                </div>

                <div style="margin-top: 3rem; font-size: 0.7rem; color: var(--text-dim)">
                    <span class="section-label">Source Path</span>
                    <p style="word-break: break-all; opacity: 0.6">${song.source_path}</p>
                </div>
            `;
        }
    </script>
</body>

</html>
