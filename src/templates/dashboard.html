<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gosling Discovery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>

<body>
    <header>
        <div class="logo">GOSLING<span>.</span></div>
        <nav class="mode-tabs" aria-label="Dashboard modes">
            <button id="mode-songs" class="mode-tab active" data-action="switch-mode" data-mode="songs">Songs</button>
            <button id="mode-albums" class="mode-tab" data-action="switch-mode" data-mode="albums">Albums</button>
            <button id="mode-artists" class="mode-tab" data-action="switch-mode" data-mode="artists">Artists</button>
            <button id="mode-publishers" class="mode-tab" data-action="switch-mode"
                data-mode="publishers">Publishers</button>
            <button id="mode-tags" class="mode-tab" data-action="switch-mode" data-mode="tags">Tags</button>
            <button id="mode-ingest" class="mode-tab" data-action="switch-mode" data-mode="ingest">Ingest</button>
        </nav>
        <div class="search-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input type="text" id="searchInput" placeholder="Search songs, artists, albums..." autocomplete="off">
        </div>
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="total-count">0</div>
                <div class="stat-label" id="total-label">Songs Loaded</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="match-count">0</div>
                <div class="stat-label" id="match-label">Matches</div>
            </div>
        </div>
    </header>
    <main>
        <section class="results-panel">
            <div class="results-header">
                <span class="results-title">Results</span>
                <span class="results-count" id="results-count">0 songs</span>
            </div>
            <div id="results-container">
                <div class="empty-state">
                    <div class="empty-glyph">♪</div>
                    <p>Start typing to discover music</p>
                </div>
            </div>
        </section>
        <section class="detail-panel" id="detail-panel"></section>
    </main>
    <script type="module" src="/static/js/dashboard/main.js"></script>
</body>

</html>
