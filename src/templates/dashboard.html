<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gosling Discovery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0b0f;
            --bg-surface: #12131a;
            --bg-card: #1a1b24;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-accent: rgba(255, 255, 255, 0.12);
            --accent: #f97316;
            --accent-dim: #f9731655;
            --accent-glow: rgba(249, 115, 22, 0.15);
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            border-bottom: 1px solid var(--border-subtle);
            background: var(--bg-surface);
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .logo span {
            color: var(--accent);
        }

        .search-wrapper {
            flex: 1;
            max-width: 480px;
            position: relative;
        }

        .search-wrapper svg {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-muted);
        }

        #searchInput {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s ease;
        }

        #searchInput::placeholder {
            color: var(--text-muted);
        }

        #searchInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .stats-bar {
            display: flex;
            gap: 1.5rem;
            margin-left: auto;
        }

        .stat-item {
            text-align: right;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .results-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-subtle);
            min-width: 400px;
        }

        .results-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .results-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .results-count {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        #results-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .song-card {
            padding: 1rem 1.25rem;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .song-card:hover {
            background: #1f2029;
            border-color: var(--border-accent);
        }

        .song-card.active {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .song-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-dim), transparent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .song-icon svg {
            width: 20px;
            height: 20px;
            color: var(--accent);
        }

        .song-details {
            flex: 1;
            min-width: 0;
        }

        .song-title {
            font-weight: 500;
            font-size: 0.95rem;
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .song-genre {
            color: var(--accent);
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            background: var(--accent-glow);
            border-radius: 4px;
        }

        .song-year {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
        }

        .detail-panel {
            width: 480px;
            background: var(--bg-surface);
            display: none;
            flex-direction: column;
            animation: slideIn 0.25s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .detail-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .detail-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .detail-path {
            font-size: 0.75rem;
            color: var(--text-muted);
            word-break: break-all;
            font-family: 'JetBrains Mono', monospace;
        }

        .detail-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .detail-section {
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-subtle);
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        .meta-item {
            background: var(--bg-card);
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid var(--border-subtle);
        }

        .meta-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .meta-value {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .meta-value.mono {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
        }

        .tags-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .tag {
            font-size: 0.75rem;
            padding: 0.3rem 0.6rem;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            color: var(--text-secondary);
        }

        .tag.genre {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        .credits-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .credit-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0.75rem;
            background: var(--bg-card);
            border-radius: 6px;
            border: 1px solid var(--border-subtle);
        }

        .credit-name {
            font-weight: 500;
            font-size: 0.9rem;
        }

        .credit-role {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .albums-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .album-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            padding: 1rem;
        }

        .album-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }

        .album-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .album-meta span {
            padding: 0.15rem 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            border: 1px solid var(--border-subtle);
        }

        .album-meta .album-publishers {
            color: #FFB84D;
            background: rgba(255, 184, 77, 0.1);
            border-color: rgba(255, 184, 77, 0.2);
        }

        .album-meta .album-artist {
            color: var(--accent);
        }

        .file-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        .file-status.found {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: var(--success);
        }

        .file-status.missing {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger);
        }

        .file-status.loading {
            background: rgba(234, 179, 8, 0.1);
            border: 1px solid rgba(234, 179, 8, 0.3);
            color: var(--warning);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            padding: 2rem;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 0.9rem;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-accent);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">GOSLING<span>.</span></div>
        <div class="search-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input type="text" id="searchInput" placeholder="Search songs, artists, albums..." autocomplete="off">
        </div>
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="total-count">—</div>
                <div class="stat-label">Total Songs</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="match-count">—</div>
                <div class="stat-label">Matches</div>
            </div>
        </div>
    </header>

    <main>
        <section class="results-panel">
            <div class="results-header">
                <span class="results-title">Results</span>
                <span class="results-count" id="results-count">0 songs</span>
            </div>
            <div id="results-container">
                <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                    </svg>
                    <p>Start typing to discover music</p>
                </div>
            </div>
        </section>

        <section class="detail-panel" id="detail-panel"></section>
    </main>

    <script>
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('results-container');
        const detailPanel = document.getElementById('detail-panel');
        const resultsCount = document.getElementById('results-count');
        const totalCount = document.getElementById('total-count');
        const matchCount = document.getElementById('match-count');

        let debounceTimer;
        let currentQuery = '';
        let cachedSongs = [];
        let selectedIndex = -1;

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function updateSelection() {
            const cards = document.querySelectorAll('.song-card');
            cards.forEach((c, i) => c.classList.toggle('active', i === selectedIndex));
            if (selectedIndex >= 0 && selectedIndex < cards.length) {
                cards[selectedIndex].scrollIntoView({ block: 'nearest' });
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && detailPanel.style.display === 'flex') {
                detailPanel.style.display = 'none';
                document.querySelectorAll('.song-card').forEach(c => c.classList.remove('active'));
                selectedIndex = -1;
            }
            if (document.activeElement === searchInput && cachedSongs.length > 0) {
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    selectedIndex = Math.min(selectedIndex + 1, cachedSongs.length - 1);
                    updateSelection();
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    selectedIndex = Math.max(selectedIndex - 1, -1);
                    updateSelection();
                } else if (e.key === 'Enter' && selectedIndex >= 0) {
                    e.preventDefault();
                    showDetail(cachedSongs[selectedIndex], document.querySelectorAll('.song-card')[selectedIndex]);
                }
            }
        });

        searchInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            currentQuery = e.target.value.trim();
            debounceTimer = setTimeout(() => {
                searchSongs(currentQuery);
            }, 250);
        });

        searchSongs('');

        async function searchSongs(query) {
            try {
                const url = query ? `/api/v1/songs/search?q=${encodeURIComponent(query)}` : '/api/v1/songs/search';
                const response = await fetch(url);
                if (!response.ok) throw new Error('Search failed: ' + response.status);
                const songs = await response.json();
                renderResults(songs);
            } catch (error) {
                resultsContainer.innerHTML = `<div class="empty-state"><p style="color: var(--danger)">Error: ${error.message}</p></div>`;
            }
        }

        function renderResults(songs) {
            cachedSongs = songs;
            selectedIndex = -1;
            resultsCount.textContent = `${songs.length} song${songs.length !== 1 ? 's' : ''}`;
            matchCount.textContent = songs.length;

            if (songs.length === 0) {
                resultsContainer.innerHTML = `<div class="empty-state"><p>No songs found</p></div>`;
                return;
            }

            resultsContainer.innerHTML = songs.map((song, idx) => `
                <div class="song-card" data-idx="${idx}">
                    <div class="song-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                        </svg>
                    </div>
                    <div class="song-details">
                        <div class="song-title">${escapeHtml(song.title || song.media_name || 'Untitled')}</div>
                        <div class="song-meta">
                            <span>${escapeHtml(song.display_artist || 'Unknown Artist')}</span>
                            ${song.primary_genre ? `<span class="song-genre">${escapeHtml(song.primary_genre)}</span>` : ''}
                            <span class="song-year">${escapeHtml(song.year || '—')}</span>
                        </div>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.song-card').forEach(card => {
                card.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.idx);
                    selectedIndex = idx;
                    updateSelection();
                    showDetail(cachedSongs[idx], this);
                });
            });
        }

        async function showDetail(song, element) {
            document.querySelectorAll('.song-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            detailPanel.style.display = 'flex';

            renderDetailSkeleton(song);

            try {
                const response = await fetch(`/api/v1/metabolic/inspect-file/${song.id}`);
                const fileData = response.ok ? await response.json() : null;
                renderDetailComplete(song, fileData, !response.ok);
            } catch (err) {
                console.error('Error:', err);
                renderDetailComplete(song, null, true);
            }
        }

        function renderDetailSkeleton(song) {
            detailPanel.innerHTML = `
                <div class="detail-header">
                    <div class="detail-title">${escapeHtml(song.title)}</div>
                    <div class="detail-path">${escapeHtml(song.source_path || 'No source path')}</div>
                </div>
                <div class="detail-content">
                    <div class="file-status loading">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        Loading file info...
                    </div>
                    <div class="meta-grid">
                        <div class="meta-item"><div class="meta-label">Title</div><div class="meta-value">${escapeHtml(song.media_name || song.title)}</div></div>
                        <div class="meta-item"><div class="meta-label">Artist</div><div class="meta-value">${escapeHtml(song.display_artist || '—')}</div></div>
                        <div class="meta-item"><div class="meta-label">Year</div><div class="meta-value">${escapeHtml(song.year || '—')}</div></div>
                        <div class="meta-item"><div class="meta-label">BPM</div><div class="meta-value">${escapeHtml(song.bpm || '—')}</div></div>
                        <div class="meta-item"><div class="meta-label">Duration</div><div class="meta-value">${escapeHtml(song.formatted_duration || '—')}</div></div>
                        <div class="meta-item"><div class="meta-label">ISRC</div><div class="meta-value mono">${escapeHtml(song.isrc || '—')}</div></div>
                    </div>
                </div>
            `;
        }

        function renderDetailComplete(song, fileData, fileMissing) {
            const rawCredits = Array.isArray(song.credits) ? song.credits : [];
            const fileCredits = fileData && Array.isArray(fileData.credits) ? fileData.credits : [];
            
            const rawAlbums = Array.isArray(song.albums) ? song.albums : [];
            const fileAlbums = fileData && Array.isArray(fileData.albums) ? fileData.albums : [];
            
            const rawTags = Array.isArray(song.tags) ? song.tags : [];
            const fileTags = fileData && Array.isArray(fileData.tags) ? fileData.tags : [];
            
            const rawPublishers = Array.isArray(song.publishers) ? song.publishers : [];
            const filePublishers = fileData && Array.isArray(fileData.publishers) ? fileData.publishers : [];

            const statusHtml = fileMissing 
                ? `<div class="file-status missing"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>File not found</div>`
                : `<div class="file-status found"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>File verified</div>`;

            const renderCredits = (credits, source) => {
                if (!credits.length) return '';
                
                const roleGroups = {
                    'Producers': ['producer', 'executive producer', 'co-producer', 'associate producer'],
                    'Writers': ['writer', 'composer', 'lyricist', 'author'],
                    'Performers': ['artist', 'performer', 'vocals', 'featuring', 'featured', 'featured artist'],
                    'Engineers': ['engineer', 'mixing', 'mixing engineer', 'mastering', 'mastering engineer', 'recording'],
                    'Other': []
                };
                
                const groups = {};
                Object.keys(roleGroups).forEach(k => groups[k] = []);
                
                credits.forEach(c => {
                    const role = (c.role_name || '').toLowerCase();
                    let placed = false;
                    for (const [groupName, keywords] of Object.entries(roleGroups)) {
                        if (keywords.some(k => role.includes(k))) {
                            groups[groupName].push(c);
                            placed = true;
                            break;
                        }
                    }
                    if (!placed) groups['Other'].push(c);
                });
                
                return Object.entries(groups).filter(([_, items]) => items.length).map(([groupName, items]) => `
                    <div style="margin-bottom:0.75rem">
                        <div style="font-size:0.65rem;color:var(--accent);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.35rem">${groupName}</div>
                        <div class="credits-list">${items.map(c => `
                            <div class="credit-item">
                                <span class="credit-name">${escapeHtml(c.display_name || c.name || '-')}</span>
                                <span class="credit-role">${escapeHtml(c.role_name || '-')}</span>
                            </div>
                        `).join('')}</div>
                    </div>
                `).join('');
            };

            const renderAlbums = (albums) => {
                if (!albums.length) return '';
                return albums.map(a => {
                    const title = a.album_title || a.display_title || 'Unknown Album';
                    const parts = [];
                    if (a.album_type) parts.push(`<span>${escapeHtml(a.album_type)}</span>`);
                    if (a.release_year) parts.push(`<span>${escapeHtml(a.release_year)}</span>`);
                    if (a.display_publisher) parts.push(`<span class="album-publishers">${escapeHtml(a.display_publisher)}</span>`);

                    let albumArtistsStr = '';
                    if (a.credits && a.credits.length) {
                        const aa = a.credits.map(c => c.display_name || c.name);
                        if (aa.length) {
                            albumArtistsStr = `<div style="font-size:0.75rem;color:var(--accent);margin-top:0.5rem">Album Artist: ${escapeHtml(aa.join(', '))}</div>`;
                        }
                    }

                    return `<div class="album-card"><div class="album-title">${escapeHtml(title)}</div><div class="album-meta">${parts.join('')}</div>${albumArtistsStr}</div>`;
                }).join('');
            };

            const renderTags = (tags, isGenre = false) => {
                if (!tags.length) return '';
                return `<div class="tags-list">${tags.map(t => `<span class="tag ${isGenre ? 'genre' : ''}">${escapeHtml(t.name || t.display_name || '-')}</span>`).join('')}</div>`;
            };

            const formatList = (arr, key) => arr?.length ? arr.map(i => escapeHtml(i[key] || i.name || '-')).join(', ') : '—';

            const mkRow = (label, dbVal, fileVal, isMono = false) => {
                const match = String(dbVal).toLowerCase() === String(fileVal).toLowerCase();
                const color = match ? 'var(--text-primary)' : 'var(--danger)';
                return `<tr><td style="padding:6px;font-size:0.75rem;color:var(--text-muted)">${escapeHtml(label)}</td><td style="padding:6px;font-size:0.85rem">${escapeHtml(dbVal || '-')}</td><td style="padding:6px;font-size:0.85rem;color:${color}">${escapeHtml(fileVal || '-')}</td></tr>`;
            };

            const dbGenres = rawTags.filter(t => t.category?.toLowerCase() === 'genre').map(t => t.name);
            const fileGenres = fileTags.filter(t => t.category?.toLowerCase() === 'genre').map(t => t.name);
            const dbOther = rawTags.filter(t => t.category?.toLowerCase() !== 'genre').map(t => t.name);
            const fileOther = fileTags.filter(t => t.category?.toLowerCase() !== 'genre').map(t => t.name);

            detailPanel.innerHTML = `
                <div class="detail-header">
                    <div class="detail-title">${escapeHtml(song.title)}</div>
                    <div class="detail-path">${escapeHtml(song.source_path || 'No source path')}</div>
                </div>
                <div class="detail-content">
                    ${statusHtml}
                    
                    <div class="detail-section">
                        <div class="section-title">Core Metadata</div>
                        <table style="width:100%;border-collapse:collapse;font-size:0.85rem">
                            <thead><tr><th style="text-align:left;padding:8px;font-size:0.7rem;color:var(--text-muted);border-bottom:1px solid var(--border-subtle)">Field</th><th style="text-align:left;padding:8px;font-size:0.7rem;color:var(--text-muted);border-bottom:1px solid var(--border-subtle)">Library</th><th style="text-align:left;padding:8px;font-size:0.7rem;color:var(--text-muted);border-bottom:1px solid var(--border-subtle)">File</th></tr></thead>
                            <tbody>
                                ${mkRow('Title', song.media_name, fileData?.media_name)}
                                ${mkRow('Artist', song.display_artist, fileData?.display_artist)}
                                ${mkRow('Year', song.year, fileData?.year)}
                                ${mkRow('BPM', song.bpm, fileData?.bpm)}
                                ${mkRow('Duration', song.formatted_duration, fileData?.formatted_duration)}
                                ${mkRow('ISRC', song.isrc, fileData?.isrc, true)}
                                ${mkRow('Publisher (Master)', song.display_master_publisher, fileData?.display_master_publisher)}
                            </tbody>
                        </table>
                    </div>

                    <div class="detail-section">
                        <div class="section-title">Credits</div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                            <div>
                                <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:0.5rem">Library (${rawCredits.length})</div>
                                ${renderCredits(rawCredits, 'db')}
                            </div>
                            <div>
                                <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:0.5rem">File (${fileCredits.length})</div>
                                ${renderCredits(fileCredits, 'file')}
                            </div>
                        </div>
                    </div>

                    <div class="detail-section">
                        <div class="section-title">Albums</div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                            <div>
                                <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:0.5rem">Library (${rawAlbums.length})</div>
                                <div class="albums-list">${renderAlbums(rawAlbums)}</div>
                            </div>
                            <div>
                                <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:0.5rem">File (${fileAlbums.length})</div>
                                <div class="albums-list">${renderAlbums(fileAlbums)}</div>
                            </div>
                        </div>
                    </div>

                    <div class="detail-section">
                        <div class="section-title">Genres</div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                            <div>
                                <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:0.5rem">Library (${dbGenres.length})</div>
                                ${renderTags(rawTags.filter(t => t.category?.toLowerCase() === 'genre'), true)}
                            </div>
                            <div>
                                <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:0.5rem">File (${fileGenres.length})</div>
                                ${renderTags(fileTags.filter(t => t.category?.toLowerCase() === 'genre'), true)}
                            </div>
                        </div>
                    </div>

                    <div class="detail-section">
                        <div class="section-title">Other Tags</div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                            <div>
                                <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:0.5rem">Library (${dbOther.length})</div>
                                ${renderTags(rawTags.filter(t => t.category?.toLowerCase() !== 'genre'))}
                            </div>
                            <div>
                                <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:0.5rem">File (${fileOther.length})</div>
                                ${renderTags(fileTags.filter(t => t.category?.toLowerCase() !== 'genre'))}
                            </div>
                        </div>
                    </div>

                    <div class="detail-section">
                        <div class="section-title">Publishers</div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                            <div>
                                <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:0.5rem">Library (${rawPublishers.length})</div>
                                ${renderTags(rawPublishers)}
                            </div>
                            <div>
                                <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:0.5rem">File (${filePublishers.length})</div>
                                ${renderTags(filePublishers)}
                            </div>
                        </div>
                    </div>

                    ${fileData?.raw_tags && Object.keys(fileData.raw_tags).length ? `
                    <div class="detail-section">
                        <div class="section-title">Raw Tags (${Object.keys(fileData.raw_tags).length})</div>
                        <div style="background:var(--bg-card);padding:0.75rem;border-radius:8px;border:1px solid var(--border-subtle);font-family:'JetBrains Mono',monospace;font-size:0.75rem;max-height:200px;overflow-y:auto">
                            ${Object.entries(fileData.raw_tags).map(([k, v]) => `<div style="margin-bottom:0.25rem"><span style="color:var(--accent)">${escapeHtml(k)}</span>: ${escapeHtml(v.join(', '))}</div>`).join('')}
                        </div>
                    </div>
                    ` : ''}

                    <div class="detail-section">
                        <div class="section-title">Audio Hash</div>
                        <div class="meta-item" style="padding:0.75rem">
                            <div class="meta-value mono" style="font-size:0.7rem;word-break:break-all">${escapeHtml(song.audio_hash || '—')}</div>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>

</html>
